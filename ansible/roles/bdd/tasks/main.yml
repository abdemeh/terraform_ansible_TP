---
# tasks file for bdd
---
- name: installation des pkgs
  apt:
    name: 
      - postgresql
    state: present
    update_cache: yes

- name: création groupe cytech_grp
  group:
    name: cytech_grp
    state: present

- name: création utilisateur cytech_usr attribué au groupe cytech_grp
  user:
    name: cytech_usr
    groups: cytech_grp
    state: present

- name: démarrage PostgreSQL
  service:
    name: postgresql
    state: started
    enabled: yes

- name: création utilisateur cytech_usr pour PostgreSQL
  become_user: postgres
  postgresql_user:
    name: cytech_usr
    role_attr_flags: CREATEDB

- name: création base de données
  become_user: postgres
  postgresql_db:
    name: cytech
    owner: cytech_usr

- name: configuration postgresql.conf pour écouter toutes les adresses
  lineinfile:
    path: /etc/postgresql/14/main/postgresql.conf 
    line: "listen_addresses = '*'"
  notify: Restart PostgreSQL


- name: autorisation de machine APP
  become_user: postgres
  postgresql_pg_hba:
    dest: /etc/postgresql/14/main/pg_hba.conf
    contype: host
    users: cytech_usr
    databases: cytech
    method: trust
    source: "{{ hostvars['app_node']['ansible_host'] }}/32"
  notify: Restart PostgreSQL

- name: autorisation de localhost
  become_user: postgres
  postgresql_pg_hba:
    dest: /etc/postgresql/14/main/pg_hba.conf
    contype: host
    users: cytech_usr
    databases: cytech
    method: trust
    source: "127.0.0.1/32"
  notify: Restart PostgreSQL

- name: création de la table cytech_usr
  become_user: postgres
  postgresql_query:
    db: cytech
    query: |
      CREATE TABLE IF NOT EXISTS cytech_usr (
          id SERIAL PRIMARY KEY,
          name VARCHAR(50) NOT NULL
      );
      INSERT INTO cytech_usr (name) VALUES ('Abdellatif EL MAHDAOUI');

